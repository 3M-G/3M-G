<svg width="900" height="1900" viewBox="0 0 900 1900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Perfil GitHub de Guilherme Costa Ferreira, 3M-G</title>
  <desc id="desc">Vitrine visual em estilo terminal futurista azul para README do GitHub.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#092b5f"/>
      <stop offset="45%" stop-color="#020a14"/>
      <stop offset="100%" stop-color="#00040a"/>
    </radialGradient>
    <linearGradient id="blue" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#004dff"/>
      <stop offset="45%" stop-color="#00a2ff"/>
      <stop offset="100%" stop-color="#004dff"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
